[tool.black]
line-length = 100

[tool.ruff]
line-length = 100

[tool.ruff.lint]
ignore = ["E501"]

[tool.pylint.FORMAT]
max-line-length = 100
# Closest to ESLint max-len { ignoreStrings: true } — allow long lines that contain quotes
ignore-long-lines = '["'']|https?://'

[tool.pylint."MESSAGES CONTROL"]
disable = [
  "missing-function-docstring",
  "missing-module-docstring",
  "missing-class-docstring",
]
